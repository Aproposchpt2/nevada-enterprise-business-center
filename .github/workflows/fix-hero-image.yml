name: Fix hero image path

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-hero-image:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy CapGen headquarters image and fix index path
        run: |
          set -euo pipefail
          mkdir -p assets
          curl -L --fail "https://raw.githubusercontent.com/Aproposchpt2/CapGen-Govt-Search--Engine/main/headquarters.webp" -o assets/nevada-enterprise-hero.webp
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = 'src="/APROPOS-BIZPLAN-main/assets/nevada-enterprise-hero.webp"'
          new = 'src="/assets/nevada-enterprise-hero.webp"'
          if old not in text and new not in text:
              raise SystemExit('Expected hero image src was not found in index.html')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY

      - name: Commit final hero image fix
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/nevada-enterprise-hero.webp
          git rm --ignore-unmatch .github/workflows/fix-hero-image.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix: hero image path — nevada-enterprise-hero.webp"
            git push
          fi
