<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Website Builder — APROPOS BUSINESS CENTER™</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
:root{--sapphire:#0F2A6A;--goldstd:#C9A84C}
.wb-wrap{max-width:860px;margin:0 auto;padding:30px 20px 60px}
.wb-intro{ text-align:center;margin-bottom:22px }
.wb-intro .eyebrow{color:var(--sapphire)}
.wb-intro .dot{background:var(--goldstd)}
.wb-intro h1{font-family:'Cinzel',serif;color:var(--sapphire);font-size:clamp(1.7rem,4vw,2.4rem);margin:12px 0 4px;font-weight:700}
.wb-intro p{color:var(--ink2);max-width:560px;margin:0 auto}
.wb-card{background:#fff;border:1px solid var(--line);border-top:4px solid var(--sapphire);border-radius:18px;padding:22px;box-shadow:0 18px 44px rgba(15,42,106,.08)}
.wb-hd{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.wb-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--sapphire),#1c47a8);color:var(--goldstd);display:grid;place-items:center;font-family:'Cinzel',serif;font-weight:700;font-size:1.3rem;flex:0 0 46px}
.wb-name{font-family:'Cinzel',serif;font-weight:700;color:var(--sapphire);font-size:1.05rem}
.wb-status{font-size:.78rem;color:var(--ink2);font-weight:700}
.wb-chat{display:flex;flex-direction:column;gap:12px;padding:6px 2px 14px}
.wb-m{max-width:88%;padding:11px 15px;border-radius:14px;font-size:.96rem;line-height:1.55}
.wb-m.bot{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--goldstd);border-bottom-left-radius:4px;color:var(--ink)}
.wb-m.user{align-self:flex-end;background:var(--sapphire);color:#fff;border-bottom-right-radius:4px}
.wb-options{border-top:1px solid var(--line2);padding-top:16px;margin-top:4px}
.wb-optgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;font-weight:600;font-size:.92rem;color:var(--ink);background:#fff;transition:.15s;text-align:left}
.opt:hover{border-color:var(--sapphire)}
.opt.sel{border-color:var(--sapphire);background:#f2f5fc;box-shadow:inset 0 0 0 1px var(--sapphire)}
.opt .box{width:18px;height:18px;border-radius:5px;border:2px solid var(--sapphire);flex:0 0 18px;display:grid;place-items:center;color:#fff;font-size:.72rem}
.opt.sel .box{background:var(--sapphire)}
.wb-fields{display:grid;gap:12px}
.wb-field label{display:block;font-weight:700;font-size:.85rem;color:var(--sapphire);margin-bottom:5px}
.wb-field input{width:100%;font-family:var(--body);font-size:.95rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
.wb-field input:focus{outline:none;border-color:var(--sapphire)}
.wb-otherwrap{margin-top:10px}
.wb-otherwrap input,.wb-upload input{width:100%;font-family:var(--body);font-size:.95rem;padding:11px 13px;border:1px solid var(--line);border-radius:10px}
.wb-imgrow{display:flex;gap:12px;flex-wrap:wrap}
.wb-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
.wb-hint{font-size:.8rem;color:var(--ink2)}
.btn-gold{display:inline-flex;align-items:center;gap:8px;background:var(--goldstd);color:var(--sapphire);font-weight:800;font-size:.95rem;padding:12px 24px;border-radius:11px;border:2px solid var(--goldstd);cursor:pointer;transition:.2s;font-family:var(--body)}
.btn-gold:hover:not(:disabled){box-shadow:0 0 22px rgba(201,168,76,.7)}
.btn-gold:disabled{opacity:.45;cursor:not-allowed}
.btn-sap{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--sapphire);font-weight:800;font-size:.95rem;padding:12px 22px;border-radius:11px;border:1.5px solid var(--sapphire);cursor:pointer;font-family:var(--body);transition:.2s}
.btn-sap.sel,.btn-sap:hover{background:var(--sapphire);color:#fff}
.wb-progress{height:10px;background:var(--line2);border-radius:999px;overflow:hidden;margin-top:14px;display:none}
.wb-progress.show{display:block}
.wb-progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--goldstd),#e2c878);border-radius:999px;transition:width .4s ease}
@media(max-width:600px){.wb-optgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="focus-top"><a class="logo" href="/index.html"><span class="mk">A</span>APROPOS BUSINESS CENTER™</a></header>

<main class="wb-wrap">
  <div class="wb-intro">
    <span class="eyebrow"><span class="dot"></span>Website Design Agent</span>
    <h1>Build Your Professional Website</h1>
    <p>Answer five quick questions and our AG ENGINEERING OS™ design studio builds your site to the Gold Standard — usually in about 30 seconds.</p>
  </div>
  <div class="wb-card">
    <div class="wb-hd"><div class="wb-av">A</div><div><div class="wb-name">Alex — Website Design Agent</div><div class="wb-status" id="wbStatus">Let's build your website</div></div></div>
    <div class="wb-chat" id="wbChat"></div>
    <div class="wb-options" id="wbOptions"></div>
    <div class="wb-progress" id="wbProgress"><span id="wbProgressBar"></span></div>
  </div>
</main>

<script src="/app.js"></script>
<script>
// ---- Industry config: hero image + suggested services per business type ----
var INDUSTRY = {
  pro:        { label:'Professional Services', hero:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1920&q=80', services:['Business Consulting','Strategy & Planning','Financial Advisory','Legal Services','Marketing & Branding','Training & Coaching','Government Contracting'] },
  trades:     { label:'Contractor & Trades', hero:'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1920&q=80', services:['General Construction','Electrical','Plumbing','HVAC','Remodeling','Roofing','Emergency Repairs'] },
  health:     { label:'Health & Wellness', hero:'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=1920&q=80', services:['Primary Care','Dental Care','Physical Therapy','Fitness Training','Massage & Spa','Nutrition','Mental Wellness'] },
  restaurant: { label:'Restaurant & Food Service', hero:'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&q=80', services:['Dine-In','Takeout & Delivery','Catering','Private Events','Bar & Beverage','Seasonal Menu'] },
  retail:     { label:'Retail & E-commerce', hero:'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1920&q=80', services:['In-Store Shopping','Online Store','Custom Orders','Wholesale','Gift Cards','Personal Shopping'] },
  tech:       { label:'Technology & Software', hero:'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920&q=80', services:['Custom Software','Web & App Development','IT Support','Cloud Solutions','Cybersecurity','Data & Analytics'] },
  creative:   { label:'Creative & Design', hero:'https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=1920&q=80', services:['Brand Identity','Graphic Design','Web Design','Photography','Video Production','Content Creation'] },
  realestate: { label:'Real Estate', hero:'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1920&q=80', services:['Buying','Selling','Property Management','Commercial Real Estate','Investment Consulting','Leasing'] },
  education:  { label:'Education & Training', hero:'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=1920&q=80', services:['Courses & Classes','1-on-1 Tutoring','Corporate Training','Certifications','Workshops','Online Learning'] },
  other:      { label:'Professional Business', hero:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1920&q=80', services:['Consulting','Custom Solutions','Support & Service','Strategy & Planning','Project Management','Training'] }
};
var Q1_OPTIONS = [
  ['pro','Professional Services (consultant, attorney, accountant, coach)'],
  ['trades','Contractor & Trades (construction, electrical, plumbing, HVAC)'],
  ['health','Health & Wellness (medical, dental, fitness, spa)'],
  ['restaurant','Restaurant & Food Service'],
  ['retail','Retail & E-commerce'],
  ['tech','Technology & Software'],
  ['creative','Creative & Design'],
  ['realestate','Real Estate'],
  ['education','Education & Training'],
  ['other','Other']
];
var Q4_OPTIONS = ['Powerful & Authoritative','Modern & Tech-Forward','Warm & Approachable','Prestigious & Luxurious','Bold & Energetic','Clean & Minimal','Trustworthy & Established','Innovative & Cutting-Edge'];

var chat=document.getElementById('wbChat'), opts=document.getElementById('wbOptions'), statusEl=document.getElementById('wbStatus');
var answers={ business_type:'', business_type_key:'other', business_name:'', city_state:'', one_liner:'', contact:'', services:[], feel:[], hero_image:'', hero_upload:'' };
function bubble(role,text){ var d=document.createElement('div'); d.className='wb-m '+role; d.innerHTML = role==='user'?escapeHtml(text):mdInline(text); chat.appendChild(d); d.scrollIntoView({behavior:'smooth',block:'nearest'}); return d; }
function clearOpts(){ opts.innerHTML=''; }
function ack(question,answer,final){ return fetch('/.netlify/functions/website-agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question,answer:answer,final:!!final})}).then(function(r){return r.json();}).then(function(d){ return (d&&d.reply)||''; }).catch(function(){ return ''; }); }

// ---------- Question renderers ----------
function q1(){
  statusEl.textContent='Question 1 of 5 · Business type';
  bubble('bot',"Great — let's build your website. First, what best describes your business?");
  var grid=document.createElement('div'); grid.className='wb-optgrid';
  var sel=null, otherInput=null;
  Q1_OPTIONS.forEach(function(o){
    var el=document.createElement('div'); el.className='opt'; el.innerHTML='<span class="box">✓</span><span>'+escapeHtml(o[1])+'</span>';
    el.addEventListener('click',function(){ if(sel)sel.classList.remove('sel'); sel=el; el.classList.add('sel'); answers.business_type_key=o[0]; answers.business_type=(o[0]==='other')?'':INDUSTRY[o[0]].label;
      otherWrap.style.display=(o[0]==='other')?'block':'none'; cont.disabled=false; });
    grid.appendChild(el);
  });
  var otherWrap=document.createElement('div'); otherWrap.className='wb-otherwrap'; otherWrap.style.display='none';
  otherInput=document.createElement('input'); otherInput.placeholder='Tell me your business type…'; otherWrap.appendChild(otherInput);
  var foot=document.createElement('div'); foot.className='wb-foot';
  var hint=document.createElement('span'); hint.className='wb-hint'; hint.textContent='Pick the closest fit.';
  var cont=document.createElement('button'); cont.className='btn-gold'; cont.textContent='Continue →'; cont.disabled=true;
  cont.addEventListener('click',function(){
    if(answers.business_type_key==='other'){ answers.business_type=(otherInput.value||'Professional Business').trim(); }
    answers.hero_image=INDUSTRY[answers.business_type_key].hero;
    submit("what best describes your business", answers.business_type, q2);
  });
  foot.appendChild(hint); foot.appendChild(cont);
  opts.appendChild(grid); opts.appendChild(otherWrap); opts.appendChild(foot);
}

function q2(){
  statusEl.textContent='Question 2 of 5 · Business info';
  bubble('bot',"Perfect. Now tell me about your business — I'll use this to write your website content.");
  var wrap=document.createElement('div'); wrap.className='wb-fields';
  function field(label,ph,key,type){ var f=document.createElement('div'); f.className='wb-field'; f.innerHTML='<label>'+label+'</label>'; var inp=document.createElement('input'); inp.placeholder=ph; if(type)inp.type=type; inp.addEventListener('input',function(){ answers[key]=inp.value.trim(); check(); }); f.appendChild(inp); wrap.appendChild(f); return inp; }
  field('Business Name','e.g. Mitchell Consulting Group','business_name');
  field('Your City & State','e.g. Las Vegas, NV','city_state');
  field('What you do in one sentence','e.g. We help small businesses win government contracts','one_liner');
  field('Your phone or email','e.g. 702-555-0100','contact');
  var foot=document.createElement('div'); foot.className='wb-foot';
  var hint=document.createElement('span'); hint.className='wb-hint'; hint.textContent='Business name and one-sentence description are required.';
  var cont=document.createElement('button'); cont.className='btn-gold'; cont.textContent='Continue →'; cont.disabled=true;
  function check(){ cont.disabled = !(answers.business_name && answers.one_liner); }
  cont.addEventListener('click',function(){ submit("tell me about your business", answers.business_name+' — '+answers.one_liner, q3); });
  foot.appendChild(hint); foot.appendChild(cont);
  opts.appendChild(wrap); opts.appendChild(foot);
}

function multiQuestion(cfg){
  statusEl.textContent=cfg.status;
  bubble('bot',cfg.bubble);
  var chosen=[]; var otherInput=null;
  var grid=document.createElement('div'); grid.className='wb-optgrid';
  cfg.options.forEach(function(label){
    var el=document.createElement('div'); el.className='opt'; el.innerHTML='<span class="box">✓</span><span>'+escapeHtml(label)+'</span>';
    el.addEventListener('click',function(){
      var i=chosen.indexOf(label);
      if(i>=0){ chosen.splice(i,1); el.classList.remove('sel'); }
      else { if(chosen.length>=cfg.max){ return; } chosen.push(label); el.classList.add('sel'); }
      cont.disabled = chosen.length===0 && !(otherInput&&otherInput.value.trim());
    });
    grid.appendChild(el);
  });
  var otherWrap=document.createElement('div');
  if(cfg.other){ otherWrap.className='wb-otherwrap'; otherInput=document.createElement('input'); otherInput.placeholder='Add your own (optional)…'; otherInput.addEventListener('input',function(){ cont.disabled = chosen.length===0 && !otherInput.value.trim(); }); otherWrap.appendChild(otherInput); }
  var foot=document.createElement('div'); foot.className='wb-foot';
  var hint=document.createElement('span'); hint.className='wb-hint'; hint.textContent='Select up to '+cfg.max+'.';
  var cont=document.createElement('button'); cont.className='btn-gold'; cont.textContent='Continue →'; cont.disabled=true;
  cont.addEventListener('click',function(){ var all=chosen.slice(); if(otherInput&&otherInput.value.trim())all.push(otherInput.value.trim()); cfg.onDone(all); });
  foot.appendChild(hint); foot.appendChild(cont);
  opts.appendChild(grid); if(cfg.other)opts.appendChild(otherWrap); opts.appendChild(foot);
}

function q3(){
  var svc=INDUSTRY[answers.business_type_key].services;
  multiQuestion({ status:'Question 3 of 5 · Services', max:6, other:true,
    bubble:"What services do you want to highlight on your site? Check all that apply — or type your own.",
    options:svc,
    onDone:function(all){ answers.services=all; submit("what services to highlight", all.join(', '), q4); } });
}
function q4(){
  multiQuestion({ status:'Question 4 of 5 · Brand feel', max:3, other:false,
    bubble:"How do you want visitors to feel when they land on your site? Pick the words that fit your brand.",
    options:Q4_OPTIONS,
    onDone:function(all){ answers.feel=all; submit("how visitors should feel", all.join(', '), q5); } });
}

function q5(){
  statusEl.textContent='Question 5 of 5 · Hero image';
  bubble('bot',"Last one — for your hero image, would you like us to select a professional photo that matches your industry, or would you like to upload your own?");
  var row=document.createElement('div'); row.className='wb-imgrow';
  var aiBtn=document.createElement('button'); aiBtn.className='btn-sap'; aiBtn.textContent='✦ Use AI-Selected Photo';
  var upBtn=document.createElement('button'); upBtn.className='btn-sap'; upBtn.textContent='↑ Upload My Own Photo';
  var uploadWrap=document.createElement('div'); uploadWrap.className='wb-upload'; uploadWrap.style.cssText='margin-top:12px;display:none';
  var fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='image/jpeg,image/png,image/webp'; uploadWrap.appendChild(fileInput);
  var foot=document.createElement('div'); foot.className='wb-foot';
  var hint=document.createElement('span'); hint.className='wb-hint'; hint.textContent='AI-selected matches your industry instantly.';
  var cont=document.createElement('button'); cont.className='btn-gold'; cont.textContent='Build My Website →'; cont.disabled=true;
  aiBtn.addEventListener('click',function(){ aiBtn.classList.add('sel'); upBtn.classList.remove('sel'); uploadWrap.style.display='none'; answers.hero_upload=''; answers.hero_image=INDUSTRY[answers.business_type_key].hero; cont.disabled=false; });
  upBtn.addEventListener('click',function(){ upBtn.classList.add('sel'); aiBtn.classList.remove('sel'); uploadWrap.style.display='block'; cont.disabled=true; });
  fileInput.addEventListener('change',function(){ var f=fileInput.files[0]; if(!f)return; if(f.size>3.5*1024*1024){ hint.textContent='Please choose an image under 3.5MB.'; cont.disabled=true; return; } var rd=new FileReader(); rd.onload=function(){ answers.hero_upload=rd.result; cont.disabled=false; hint.textContent='Photo ready: '+f.name; }; rd.readAsDataURL(f); });
  cont.addEventListener('click',function(){ finalize(); });
  row.appendChild(aiBtn); row.appendChild(upBtn);
  foot.appendChild(hint); foot.appendChild(cont);
  opts.appendChild(row); opts.appendChild(uploadWrap); opts.appendChild(foot);
}

// ---------- Flow control ----------
function submit(question, answerText, next){
  bubble('user', answerText);
  clearOpts();
  ack(question, answerText, false).then(function(reply){ if(reply) bubble('bot', reply); next(); });
}

function finalize(){
  bubble('user', answers.hero_upload ? 'I uploaded my own photo.' : 'Use an AI-selected photo.');
  clearOpts(); statusEl.textContent='Building your website…';
  bubble('bot','Perfect — I have everything I need. Your website is being built right now to our Gold Standard. This usually takes about 30 seconds. I\'ll have your preview ready momentarily…');
  var prog=document.getElementById('wbProgress'), bar=document.getElementById('wbProgressBar');
  prog.classList.add('show'); var pct=8; bar.style.width=pct+'%';
  var timer=setInterval(function(){ pct=Math.min(pct+Math.random()*12, 92); bar.style.width=pct+'%'; }, 700);
  var session_id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():('site-'+Date.now()+'-'+Math.round(Math.random()*1e6));
  var payload={ session_id:session_id, business_type:answers.business_type, business_name:answers.business_name, city_state:answers.city_state, one_liner:answers.one_liner, contact:answers.contact, services:answers.services, feel:answers.feel, hero_image:answers.hero_image, hero_upload:answers.hero_upload };
  fetch('/.netlify/functions/website-generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(d){
      clearInterval(timer); bar.style.width='100%';
      if(!d||!d.ok){ throw new Error((d&&d.error)||'Generation failed'); }
      Store.set('abc_web_'+d.session_id, { preview_url:d.preview_url, business_name:answers.business_name });
      setTimeout(function(){ window.location.href='/website-preview.html?session='+encodeURIComponent(d.session_id); }, 600);
    })
    .catch(function(e){ clearInterval(timer); bubble('bot','I hit a snag building your site: '+escapeHtml(String(e.message||e))+'. Please try again in a moment.'); statusEl.textContent='Something went wrong'; });
}

// Start
q1();
</script>
</body>
</html>
