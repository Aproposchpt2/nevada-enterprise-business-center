<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — Nevada Enterprise Business Center</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--sapphire:#0F2A6A;--dark:#061026;--gold:#C9A84C;--line:rgba(255,255,255,.15);--body:'Jost',Arial,sans-serif;--display:'Bodoni Moda',Georgia,serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);min-height:100vh;background:linear-gradient(180deg,var(--dark),var(--sapphire));color:rgba(255,255,255,.78);display:grid;place-items:center;padding:24px}.card{width:min(520px,100%);border:1px solid rgba(201,168,76,.36);background:rgba(255,255,255,.07);border-radius:24px;box-shadow:0 36px 90px rgba(0,0,0,.34);overflow:hidden}.top{background:rgba(15,42,106,.92);padding:24px 28px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--gold);color:var(--gold);font-weight:900}.name{font-family:var(--display);font-size:1.05rem;color:#fff}.sub{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.52);font-weight:700}.body{padding:28px}h1{font-family:var(--display);font-size:2rem;color:#fff;margin-bottom:8px}p{color:rgba(255,255,255,.62);line-height:1.65;margin-bottom:20px}.field{display:grid;gap:8px;margin-bottom:14px}label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:rgba(255,255,255,.58)}input{width:100%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:12px;padding:13px 14px;font:inherit;color:#fff;outline:none}input:focus{border-color:var(--gold)}button{width:100%;border:0;border-radius:999px;background:var(--gold);color:var(--sapphire);font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:14px 18px;cursor:pointer;margin-top:8px}.err{display:none;background:#fff1f1;color:#9d1d1d;border-radius:12px;padding:12px;margin-top:14px;font-size:.9rem}.small{text-align:center;font-size:.82rem;color:rgba(255,255,255,.5);margin-top:16px}.small a{color:var(--gold);font-weight:800;text-decoration:none}.back{position:fixed;top:18px;left:18px;color:rgba(255,255,255,.62);text-decoration:none;font-weight:700;font-size:.82rem}
</style>
</head>
<body>
<a class="back" href="/">← Home</a>
<div class="card">
  <div class="top"><div class="brand"><span class="mark">NE</span><span><span class="name">Nevada Enterprise Business Center</span><br><span class="sub">Powered by AG ENGINEERING OS™</span></span></div></div>
  <div class="body">
    <h1>Business Center Member Login</h1>
    <p>Enter your Business Center email and member code to open your Nevada contract intelligence dashboard.</p>
    <div class="field"><label for="email">Business Center Email</label><input id="email" type="email" placeholder="name@example.com"></div>
    <div class="field"><label for="code">Member Code</label><input id="code" maxlength="12" placeholder="Your member code"></div>
    <button id="submit" onclick="verifyMember()">Access My Dashboard</button>
    <div class="err" id="err"></div>
    <div class="small">Not a Business Center member? <a href="https://aibizcenter.aproposgroupllc.com">Start at AIBIZCENTER</a></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
$('code').addEventListener('input',()=>{$('code').value=$('code').value.toUpperCase();});
async function verifyMember(){
  const email=$('email').value.trim().toLowerCase();
  const accessCode=$('code').value.trim().toUpperCase();
  const err=$('err'); const btn=$('submit'); err.style.display='none';
  if(!email||!accessCode){err.textContent='Email and member code are required.';err.style.display='block';return;}
  btn.textContent='Verifying…'; btn.disabled=true;
  try{
    const res=await fetch('/.netlify/functions/bc-member-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,accessCode})});
    const data=await res.json();
    if(!data.ok){throw new Error(data.error||'Verification failed.');}
    sessionStorage.setItem('nevada_enterprise_session',JSON.stringify(data.member));
    window.location.href='/dashboard';
  }catch(e){err.textContent=e.message||'Network error. Please try again.';err.style.display='block';btn.textContent='Access My Dashboard';btn.disabled=false;}
}
</script>
</body>
</html>
